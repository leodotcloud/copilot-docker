name: Build and Publish Docker image

on:
  push:
    branches: [ 'main' ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      image_name:
        description: 'Image name (owner-managed image will be ghcr.io/<owner>/image_name)'
        required: false
        default: 'copilot'
      image_tag:
        description: 'Image tag (e.g., v1.2.3 or latest)'
        required: false
        default: ''
      copilot_version:
        description: 'Copilot CLI version to install (build-arg)'
        required: false
        default: 'latest'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: set_tag
        run: |
          # Prefer explicit workflow input if provided
          if [ "${{ github.event.inputs.image_tag }}" != "" ]; then
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "image_tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
            echo "image_tag=latest" >> $GITHUB_OUTPUT
          else
            echo "image_tag=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ${{ github.workspace }}
          file: ${{ github.workspace }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.inputs.image_name || 'copilot' }}:${{ steps.set_tag.outputs.image_tag }}
          build-args: |
            COPILOT_VERSION=${{ github.event.inputs.copilot_version || 'latest' }}
